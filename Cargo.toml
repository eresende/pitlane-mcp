[package]
name = "pitlane-mcp"
version = "0.1.0"
edition = "2021"

[[bin]]
name = "pitlane-mcp"
path = "src/main.rs"

[dependencies]
rmcp = { version = "1.3", features = ["server", "transport-io"] }
tree-sitter = "0.26"
tree-sitter-rust = "0.24"
tree-sitter-python = "0.25"
notify = "8"
bincode = { version = "2", features = ["serde"] }
serde = { version = "1", features = ["derive", "rc"] }
serde_json = "1"
walkdir = "2"
blake3 = "1"
globset = "0.4"
tokio = { version = "1", features = ["full"] }
anyhow = "1"

[dev-dependencies]
tempfile = "3"
