name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1

jobs:
  test:
    name: Test / ${{ matrix.name }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            name: Linux x86_64
            target: ''
          - os: ubuntu-24.04-arm
            name: Linux ARM64
            target: ''
          - os: macos-latest
            name: macOS Apple Silicon
            target: ''
          - os: macos-latest
            name: macOS x86_64
            target: x86_64-apple-darwin
          - os: windows-latest
            name: Windows x86_64
            target: ''

    steps:
      - uses: actions/checkout@v6

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable

      - name: Cache build artifacts
        uses: Swatinem/rust-cache@v2

      - name: Disable Windows Defender on build directories
        if: runner.os == 'Windows'
        run: Add-MpPreference -ExclusionPath "$env:USERPROFILE\.cargo", "$env:GITHUB_WORKSPACE\target"

      - name: Add Rust target (macOS x86_64 cross-compile)
        if: matrix.target != ''
        run: rustup target add ${{ matrix.target }}

      - name: Build
        run: cargo build --verbose ${{ matrix.target != '' && format('--target {0}', matrix.target) || '' }}

      - name: Run tests
        run: cargo test --verbose ${{ matrix.target != '' && format('--target {0}', matrix.target) || '' }}

  fmt:
    name: Rustfmt
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt
      - name: Check formatting
        run: cargo fmt --check

  clippy:
    name: Clippy
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy
      - uses: Swatinem/rust-cache@v2
      - name: Run Clippy
        run: cargo clippy --all-targets --all-features -- -D warnings
