name: Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      tag:
        description: 'Release tag to upload binaries to (e.g. v0.4.0)'
        required: true

env:
  CARGO_TERM_COLOR: always

jobs:
  build:
    name: Build / ${{ matrix.name }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            name: Linux x86_64
            target: ''
            artifact: pitlane-mcp-linux-x86_64.tar.gz
          - os: ubuntu-24.04-arm
            name: Linux aarch64
            target: ''
            artifact: pitlane-mcp-linux-aarch64.tar.gz
          - os: macos-latest
            name: macOS x86_64
            target: x86_64-apple-darwin
            artifact: pitlane-mcp-macos-x86_64.tar.gz
          - os: macos-latest
            name: macOS Apple Silicon
            target: aarch64-apple-darwin
            artifact: pitlane-mcp-macos-aarch64.tar.gz

    steps:
      - uses: actions/checkout@v6

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable

      - name: Cache build artifacts
        uses: Swatinem/rust-cache@v2

      - name: Add Rust target (macOS cross-compile)
        if: matrix.target != ''
        run: rustup target add ${{ matrix.target }}

      - name: Build release binaries
        run: cargo build --release ${{ matrix.target != '' && format('--target {0}', matrix.target) || '' }}

      - name: Package binaries
        run: |
          BIN_DIR=${{ matrix.target != '' && format('target/{0}/release', matrix.target) || 'target/release' }}
          tar -czf ${{ matrix.artifact }} -C "$BIN_DIR" pitlane-mcp pitlane

      - name: Upload to GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          TAG="${{ inputs.tag || github.ref_name }}"
          gh release upload "$TAG" ${{ matrix.artifact }} --clobber
