name: Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      tag:
        description: 'Release tag to upload binaries to (e.g. v0.4.0)'
        required: true

env:
  CARGO_TERM_COLOR: always

permissions:
  contents: write

jobs:
  create-release:
    name: Create GitHub Release
    runs-on: ubuntu-latest
    steps:
      - name: Create release if it doesn't exist
        env:
          GH_TOKEN: ${{ github.token }}
          GH_REPO: ${{ github.repository }}
        run: |
          TAG="${{ inputs.tag || github.ref_name }}"
          gh release create "$TAG" --title "$TAG" --generate-notes || true

  build:
    needs: create-release
    name: Build / ${{ matrix.name }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            name: Linux x86_64
            target: ''
            artifact: pitlane-mcp-linux-x86_64.tar.gz
          - os: ubuntu-24.04-arm
            name: Linux aarch64
            target: ''
            artifact: pitlane-mcp-linux-aarch64.tar.gz
          - os: macos-latest
            name: macOS x86_64
            target: x86_64-apple-darwin
            artifact: pitlane-mcp-macos-x86_64.tar.gz
          - os: macos-latest
            name: macOS Apple Silicon
            target: aarch64-apple-darwin
            artifact: pitlane-mcp-macos-aarch64.tar.gz
          - os: windows-latest
            name: Windows x86_64
            target: ''
            artifact: pitlane-mcp-windows-x86_64.zip

    steps:
      - uses: actions/checkout@v6

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable

      - name: Cache build artifacts
        uses: Swatinem/rust-cache@v2

      - name: Disable Windows Defender on build directories
        if: runner.os == 'Windows'
        run: Add-MpPreference -ExclusionPath "$env:USERPROFILE\.cargo", "$env:GITHUB_WORKSPACE\target"

      - name: Add Rust target (macOS cross-compile)
        if: matrix.target != ''
        run: rustup target add ${{ matrix.target }}

      - name: Build release binaries
        run: cargo build --release ${{ matrix.target != '' && format('--target {0}', matrix.target) || '' }}

      - name: Package binaries (Unix)
        if: runner.os != 'Windows'
        run: |
          BIN_DIR=${{ matrix.target != '' && format('target/{0}/release', matrix.target) || 'target/release' }}
          tar -czf ${{ matrix.artifact }} -C "$BIN_DIR" pitlane-mcp pitlane

      - name: Package binaries (Windows)
        if: runner.os == 'Windows'
        run: |
          Compress-Archive -Path target/release/pitlane-mcp.exe, target/release/pitlane.exe -DestinationPath ${{ matrix.artifact }}

      - name: Upload to GitHub release
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          TAG="${{ inputs.tag || github.ref_name }}"
          gh release upload "$TAG" ${{ matrix.artifact }} --clobber

  update-homebrew:
    name: Update Homebrew formula
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Download macOS tarballs
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          TAG="${{ inputs.tag || github.ref_name }}"
          gh release download "$TAG" --repo ${{ github.repository }} \
            --pattern "pitlane-mcp-macos-*.tar.gz"

      - name: Compute SHA256 checksums
        id: sha
        run: |
          echo "aarch64=$(sha256sum pitlane-mcp-macos-aarch64.tar.gz | cut -d' ' -f1)" >> $GITHUB_OUTPUT
          echo "x86_64=$(sha256sum pitlane-mcp-macos-x86_64.tar.gz | cut -d' ' -f1)" >> $GITHUB_OUTPUT

      - name: Clone tap repo
        run: |
          git clone https://x-access-token:${{ secrets.HOMEBREW_TAP_TOKEN }}@github.com/eresende/homebrew-pitlane-mcp.git

      - name: Update formula
        env:
          AARCH64_SHA: ${{ steps.sha.outputs.aarch64 }}
          X86_64_SHA: ${{ steps.sha.outputs.x86_64 }}
        run: |
          TAG="${{ inputs.tag || github.ref_name }}"
          export VERSION="${TAG#v}"
          python3 - <<'EOF'
          import re, os
          formula_path = "homebrew-pitlane-mcp/Formula/pitlane-mcp.rb"
          content = open(formula_path).read()
          content = re.sub(r'version "\d+\.\d+\.\d+"', f'version "{os.environ["VERSION"]}"', content)
          matches = list(re.finditer(r'sha256 "[a-f0-9]+"', content))
          content = content[:matches[1].start()] + f'sha256 "{os.environ["X86_64_SHA"]}"' + content[matches[1].end():]
          content = content[:matches[0].start()] + f'sha256 "{os.environ["AARCH64_SHA"]}"' + content[matches[0].end():]
          open(formula_path, "w").write(content)
          EOF

      - name: Commit and push
        run: |
          TAG="${{ inputs.tag || github.ref_name }}"
          VERSION="${TAG#v}"
          cd homebrew-pitlane-mcp
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add Formula/pitlane-mcp.rb
          git commit -m "feat: update pitlane-mcp to v${VERSION}"
          git push
